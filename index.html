<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9X Godzilla 2.0 - Ultimate Smart Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* 💎 PREMIUM 85px TOP STATUS BAR */
        .top-status-bar {
            width: 100%;
            height: 85px;
            background: linear-gradient(180deg, #151515 0%, #050505 100%);
            border-bottom: 3px solid #ff0055;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 9999;
            transition: all 0.4s ease;
        }

        .mod-title {
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #ff0055;
        }

        /* Dynamic Status Badge */
        .status-badge {
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 2px solid #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            text-align: center;
            transition: all 0.4s ease;
        }

        /* Alert Warning State (Orange/Yellow for Deposit) */
        .status-deposit-needed {
            border-color: #ffaa00 !important;
            color: #ffaa00 !important;
            background: rgba(255, 170, 0, 0.15) !important;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5) !important;
        }

        /* Fully Activated Verified State (Green) */
        .status-verified {
            border-color: #00ffcc !important;
            color: #00ffcc !important;
            background: rgba(0, 255, 204, 0.15) !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5) !important;
        }

        /* 📱 SITE CONTAINER */
        .web-container {
            width: 100%;
            height: calc(100% - 85px);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="statusBar" class="top-status-bar">
        <div class="mod-title">9X GODZILLA 2.0</div>
        <div id="statusText" class="status-badge">NOT ACTIVATED</div>
    </div>

    <div class="web-container">
        <iframe id="siteFrame" src="https://www.jaiclub18.com/#/register?invitationCode=377572996558"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('siteFrame');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');

        const REGISTER_URL = "https://www.jaiclub18.com/#/register?invitationCode=377572996558";
        
        let initialRegistrationDone = false;

        // 🔄 CONTINUOUS REAL-TIME TRACKING (0.7 Seconds Interval)
        setInterval(() => {
            try {
                let currentURL = iframe.contentWindow.location.href;
                let doc = iframe.contentWindow.document;

                // 🛑 1. LOGOUT OR DIRECT LOGIN INTERCEPT LOOP (Never allow user on login route)
                if (currentURL.includes('#/login') || currentURL.endsWith('/login') || currentURL.includes('logout')) {
                    iframe.src = REGISTER_URL; // Force back to registration
                    initialRegistrationDone = false;
                    
                    // Reset to original status
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";
                    return;
                }

                // 💸 2. LIVE DEPOSIT & BALANCE TRACKING DETECTOR
                // Elements parsed dynamically from the dashboard elements seen in the video
                let balanceElement = doc.querySelector('.balance, .total-balance, [class*="balance"]'); 
                let walletAmount = 0;

                if (balanceElement) {
                    // Extract numerical values from strings like "₹0.00" or "300"
                    walletAmount = parseFloat(balanceElement.innerText.replace(/[^0-9.]/g, '')) || 0;
                }

                // 💳 3. SYSTEM LOGIC CONTROLLER BASED ON USER REVENUE / NAVIGATION
                if (currentURL.includes('#/home') || currentURL.includes('#/main') || currentURL.includes('#/mine')) {
                    initialRegistrationDone = true;

                    if (walletAmount >= 300) {
                        // USER VERIFIED & CONNECTED (Green State triggered)
                        statusText.innerText = "USER VERIFIED / CONNECTED";
                        statusText.className = "status-badge status-verified";
                        statusBar.style.borderBottomColor = "#00ffcc";
                    } else {
                        // REGISTERED BUT NO DEPOSIT / LOW BALANCE (Orange State triggered)
                        statusText.innerText = "PLEASE DEPOSIT 300 RUPEES";
                        statusText.className = "status-badge status-deposit-needed";
                        statusBar.style.borderBottomColor = "#ffaa00";
                    }
                } else if (!initialRegistrationDone) {
                    // Default Initial State
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";
                }

            } catch (error) {
                // Background execution layer protection
            }
        }, 700);
    </script>

</body>
</html>
