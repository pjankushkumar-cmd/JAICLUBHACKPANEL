<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Club Official Member Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: #fff;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1.5px;
            background: linear-gradient(45deg, #ff8a00, #da1b60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p {
            color: #b0bec5;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #cfd8dc;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ff8a00;
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-action {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff8a00, #da1b60);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(218, 27, 96, 0.3);
            transition: 0.2s;
        }
        .btn-action:active {
            transform: scale(0.98);
        }
        .msg-box {
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: left;
            line-height: 1.6;
        }
        .msg-error {
            background-color: rgba(211, 47, 47, 0.25);
            color: #ff8a80;
            border: 1px solid #d32f2f;
        }
        .msg-error a {
            color: #ff5252;
            font-weight: bold;
            text-decoration: underline;
            display: block;
            margin-top: 8px;
            font-size: 15px;
        }
        .msg-success {
            background-color: rgba(56, 142, 60, 0.25);
            color: #a7ffeb;
            border: 1px solid #388e3c;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">JAI CLUB</div>
    <p>Official Member Verification & Login Portal</p>

    <div id="msgBox" class="msg-box"></div>

    <div class="form-group">
        <label for="userMobile">Registered Mobile Number</label>
        <input type="tel" id="userMobile" placeholder="Enter 10-digit number" maxlength="10" autocomplete="off">
    </div>

    <button class="btn-action" onclick="validateAndLogin()">Member Login</button>
</div>

<script>
    // 🔗 Aapki Official Invitation Link
    const JAI_CLUB_OFFICIAL_REG = "https://www.jaiclub18.com/#/register?invitationCode=377572996558";
    const JAI_CLUB_OFFICIAL_LOGIN = "https://www.jaiclub18.com/#/login";

    function validateAndLogin() {
        const mobile = document.getElementById('userMobile').value.trim();
        const msgBox = document.getElementById('msgBox');
        
        // Hide message initially
        msgBox.style.display = "none";
        msgBox.className = "msg-box";

        // Number check
        if (mobile.length !== 10 || isNaN(mobile)) {
            msgBox.style.display = "block";
            msgBox.classList.add("msg-error");
            msgBox.innerHTML = "⚠️ Kripya apna valid 10-digit mobile number enter karein.";
            return;
        }

        // 🔍 Smart System Check: Kya is number ne registration link open ki hai?
        let systemStatus = localStorage.getItem('verify_status_' + mobile);

        if (systemStatus === 'verified_done') {
            // SUCCESS: Agar user usi number se wapas aaya hai jis se link open ki thi
            msgBox.style.display = "block";
            msgBox.classList.add("msg-success");
            msgBox.innerHTML = "✅ Verification Successful! Welcome to Jai Club. Redirecting to login...";
            
            setTimeout(() => {
                window.location.href = JAI_CLUB_OFFICIAL_LOGIN;
            }, 1500);

        } else {
            // BLOCK & REDIRECT: Agar naya number hai ya galat number hai
            msgBox.style.display = "block";
            msgBox.classList.add("msg-error");
            msgBox.innerHTML = `❌ Yeh number system me registered nahi hai! Login karne ke liye pehle niche di gayi official link se register karein:<br>
            <a href="${JAI_CLUB_OFFICIAL_REG}" target="_blank" onclick="activateNumber('${mobile}')">👉 CLICK HERE TO REGISTER NOW</a>`;
        }
    }

    // Yeh function use hone par usi number ko unlock karega jo click karega
    function activateNumber(mobileNum) {
        localStorage.setItem('verify_status_' + mobileNum, 'verified_done');
        
        setTimeout(() => {
            const msgBox = document.getElementById('msgBox');
            msgBox.className = "msg-box msg-success";
            msgBox.innerHTML = "⏳ Official page khul gaya hai! Wahan register karne ke baad, isi page par aakar 'Member Login' par click karein.";
        }, 1000);
    }
</script>

</body>
</html>
