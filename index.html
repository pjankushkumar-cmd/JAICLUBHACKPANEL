<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godzilla 9X Ultimate Mod Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* 👑 BIGGER TOP STATUS BAR (85px Size - Clear Text) */
        .top-status-bar {
            width: 100%;
            height: 85px;
            background: linear-gradient(180deg, #151515 0%, #050505 100%);
            border-bottom: 3px solid #ff0055;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 9999;
            transition: all 0.4s ease;
        }

        .mod-title {
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #ff0055;
        }

        /* Status Badge Style */
        .status-badge {
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 2px solid #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            transition: all 0.4s ease;
        }

        /* Active Green Status */
        .status-verified {
            border-color: #00ffcc !important;
            color: #00ffcc !important;
            background: rgba(0, 255, 204, 0.15) !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5) !important;
        }

        /* 🌐 GAME CONTAINER */
        .web-container {
            width: 100%;
            height: calc(100% - 85px); /* Adjusted for bigger top bar */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="statusBar" class="top-status-bar">
        <div class="mod-title">9X GODZILLA 2.0</div>
        <div id="statusText" class="status-badge">NOT ACTIVATED</div>
    </div>

    <div class="web-container">
        <iframe id="siteFrame" src="https://www.jaiclub18.com/#/register?invitationCode=377572996558"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('siteFrame');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');

        // Aapki Links
        const REGISTER_URL = "https://www.jaiclub18.com/#/register?invitationCode=377572996558";

        // Local variable to check session registration status
        let hasRegisteredInSession = false;

        // 🔄 STRICT REAL-TIME TRACKING LOOP
        setInterval(() => {
            try {
                let currentURL = iframe.contentWindow.location.href;

                // 🛑 1. STRICT REGISTER TRIGGER: Agar URL me login dikhe, ya user logout kare, ya purana login detected ho
                if (currentURL.includes('#/login') || currentURL.endsWith('/login') || currentURL.includes('logout')) {
                    
                    // User ko bina pooche sidha fresh register link par redirect karega
                    iframe.src = REGISTER_URL; 
                    hasRegisteredInSession = false; // Status resets
                    
                    // Top Bar settings resetting to NOT ACTIVATED
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";
                    
                    alert("⚠️ Registration Required! Please create a fresh new account first to activate this panel.");
                } 
                
                // 🟢 2. CHECK SUCCESSFUL REGISTRATION / LOGIN AFTER REGISTRATION
                // Agar user register karke dashboard ya main wallet page par successfully pahunch jata hai
                else if (currentURL.includes('#/home') || currentURL.includes('#/main')) {
                    hasRegisteredInSession = true;
                    
                    // Top Bar becomes GREEN and ACTIVATED
                    statusText.innerText = "PANEL ACTIVATED / CONNECTED";
                    statusText.className = "status-badge status-verified";
                    statusBar.style.borderBottomColor = "#00ffcc";
                }
                
                // 🔄 3. LOGOUT TRACKING: Agar active user wapas home se hat kar kahin bahar jata hai
                else if (hasRegisteredInSession && (currentURL.includes('#/register') || currentURL.includes('invitationCode'))) {
                    // Agar banda chalaki se dobara bina account banaye bahar aayega toh status fir deactivate ho jayega
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";
                }

            } catch (e) {
                // Background runtime validation wrapper
            }
        }, 800); // Super fast checking (Every 0.8 seconds)
    </script>

</body>
</html>
