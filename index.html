<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godzilla 9X Mod Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* 👑 TOP STATUS BAR (Aapke Kahne Pe Ekdam Top Par Set Kiya Hai) */
        .top-status-bar {
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 2px solid #ff0055;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 9999;
            transition: 0.5s;
        }

        .mod-title {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #ff0055;
        }

        /* Status Badge (Shuru me Not Active Rahega) */
        .status-badge {
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        /* Success Status (Jab Register ho jayega) */
        .status-verified {
            border-color: #00ffcc !important;
            color: #00ffcc !important;
            background: rgba(0, 255, 204, 0.1) !important;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4) !important;
        }

        /* 🌐 REAL SITE LOADER (Niche Chalne Wali Window) */
        .web-container {
            width: 100%;
            height: calc(100% - 60px); /* Top bar ki jagah chhod kar baki poori screen */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="statusBar" class="top-status-bar">
        <div class="mod-title">9X GODZILLA 2.0</div>
        <div id="statusText" class="status-badge">NOT ACTIVATED</div>
    </div>

    <div class="web-container">
        <iframe id="siteFrame" src="https://www.jaiclub18.com/#/register?invitationCode=377572996558"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('siteFrame');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');

        // Aapki Official Links
        const REGISTER_URL = "https://www.jaiclub18.com/#/register?invitationCode=377572996558";
        const LOGIN_URL = "https://www.jaiclub18.com/#/login";

        // 🔄 AUTOMATIC REDIRECT & VALIDATION LOGIC
        // Jab bhi user iframe ke andar koi button dabayega ya page badlega:
        setInterval(() => {
            try {
                // Hum iframe ka current url track karenge
                let currentURL = iframe.contentWindow.location.href;

                // 🛑 BLOCK LOGIN CLICK: Agar user ne chalaaki se 'Login' par click kiya
                if (currentURL.includes('#/login') || currentURL.endsWith('/login')) {
                    
                    // System use automatic bina kuch kahe wapas Register link par fenk dega
                    iframe.src = REGISTER_URL; 
                    
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";
                    alert("⚠️ Access Denied! Pehle is link se naya account register karein.");
                } 
                
                // 🟢 UNLOCK CONNECTED: Agar user successfully dashboard/home par aa gaya register karke
                else if (currentURL.includes('#/home') || currentURL.includes('#/main')) {
                    statusText.innerText = "USER VERIFIED / CONNECTED";
                    statusText.className = "status-badge status-verified";
                    statusBar.style.borderBottomColor = "#00ffcc";
                }
            } catch (e) {
                // Agar third-party security block kare, toh hum safety ke liye default clicked state check rakhte hain
            }
        }, 1000); // Har 1 second me automatic check karega
    </script>

</body>
</html>
