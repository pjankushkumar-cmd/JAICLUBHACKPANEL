<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9X Godzilla 2.0 - Strict Protection Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* 👑 PREMIUM 85px TOP STATUS BAR */
        .top-status-bar {
            width: 100%;
            height: 85px;
            background: linear-gradient(180deg, #151515 0%, #050505 100%);
            border-bottom: 3px solid #ff0055;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 9999;
        }

        .mod-title {
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #ff0055;
        }

        /* Status Badge Style */
        .status-badge {
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 2px solid #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        .status-deposit-needed {
            border-color: #ffaa00 !important;
            color: #ffaa00 !important;
            background: rgba(255, 170, 0, 0.15) !important;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5) !important;
        }

        .status-verified {
            border-color: #00ffcc !important;
            color: #00ffcc !important;
            background: rgba(0, 255, 204, 0.15) !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5) !important;
        }

        /* 📱 SITE CONTAINER */
        .web-container {
            width: 100%;
            height: calc(100% - 85px);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🛡️ INVISIBLE ANTI-LOGIN SHIELD */
        /* Yeh layer user ko login screen par click karne se bilkul rok degi */
        .anti-login-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 8888;
            display: none;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="statusBar" class="top-status-bar">
        <div class="mod-title">9X GODZILLA 2.0</div>
        <div id="statusText" class="status-badge">NOT ACTIVATED</div>
    </div>

    <div class="web-container">
        <div id="shieldLayer" class="anti-login-shield">
            <div>⚠️ LOGIN NOT ALLOWED!<br><span style="font-size:13px; color:#aaa;">Redirecting to Registration Page...</span></div>
        </div>
        <iframe id="siteFrame" src="https://www.jaiclub18.com/#/register?invitationCode=377572996558"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('siteFrame');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');
        const shieldLayer = document.getElementById('shieldLayer');

        const REGISTER_URL = "https://www.jaiclub18.com/#/register?invitationCode=377572996558";
        
        // Force fully reload register link strictly at startup
        iframe.src = REGISTER_URL;

        // 🔄 ULTRA FAST TRACKING LOOP (Every 0.3 Seconds for Instant Response)
        setInterval(() => {
            try {
                let currentURL = iframe.contentWindow.location.href;
                
                // 🛑 1. IF USER ARRIVES ON LOGIN OR LOGOUT PAGE
                if (currentURL.includes('/login') || currentURL.includes('#/login') || currentURL.includes('logout')) {
                    
                    // Step A: Immediately show the shield to block any touch/click inputs
                    shieldLayer.style.display = "flex";
                    
                    // Step B: Reset Status Bar instantly
                    statusText.innerText = "NOT ACTIVATED";
                    statusText.className = "status-badge";
                    statusBar.style.borderBottomColor = "#ff0055";

                    // Step C: Forcefully kick the user back to the register URL
                    iframe.src = REGISTER_URL;
                    
                    // Step D: Hide shield after redirection is done
                    setTimeout(() => {
                        shieldLayer.style.display = "none";
                    }, 1000);
                    
                    return;
                }

                // 💸 2. LIVE DEPOSIT TRACKING LOGIC (When User is Inside Home/Dashboard)
                if (currentURL.includes('#/home') || currentURL.includes('#/main') || currentURL.includes('#/mine')) {
                    let doc = iframe.contentWindow.document;
                    let balanceElement = doc.querySelector('.balance, .total-balance, [class*="balance"]');
                    let walletAmount = 0;

                    if (balanceElement) {
                        walletAmount = parseFloat(balanceElement.innerText.replace(/[^0-9.]/g, '')) || 0;
                    }

                    // Balance Condition Checks
                    if (walletAmount >= 300) {
                        statusText.innerText = "USER VERIFIED / CONNECTED";
                        statusText.className = "status-badge status-verified";
                        statusBar.style.borderBottomColor = "#00ffcc";
                    } else {
                        statusText.innerText = "PLEASE DEPOSIT 300 RUPEES";
                        statusText.className = "status-badge status-deposit-needed";
                        statusBar.style.borderBottomColor = "#ffaa00";
                    }
                }

            } catch (error) {
                // Security policy block bypass layer
                // Agar iframe path block ho raha hai, toh hum content check backup lagate hain
                try {
                    let currentPath = iframe.contentWindow.location.hash;
                    if (currentPath.includes('login')) {
                        shieldLayer.style.display = "flex";
                        iframe.src = REGISTER_URL;
                        setTimeout(() => { shieldLayer.style.display = "none"; }, 1000);
                    }
                } catch(e) {}
            }
        }, 300); // 0.3 second loop taaki user ko click karne ka mauka hi na mile
    </script>

</body>
</html>
